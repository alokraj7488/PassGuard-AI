<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGuard AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="bg-grid"></div>

  <div class="wrapper">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6l-9-4z"
                  fill="currentColor" opacity="0.15"/>
            <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6l-9-4z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-4" stroke="var(--accent)" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="logo-row">
            <span class="logo-name">PassGuard</span>
            <span class="logo-badge">AI</span>
          </div>
          <p class="tagline">Real-time AI-powered password intelligence</p>
        </div>
      </div>
    </header>

    <!-- Card -->
    <main class="card">

      <!-- Input row -->
      <div class="input-section">
        <label class="field-label" for="password">Password</label>
        <div class="input-row">
          <div class="input-wrap">
            <span class="lock-icon">
              <svg viewBox="0 0 20 20" fill="currentColor" width="15">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              placeholder="Enter your password…"
              oninput="onPasswordInput()"
              autocomplete="new-password"
              spellcheck="false"
            />
            <button class="eye-btn" id="eyeBtn" onclick="toggleVisibility()" type="button" title="Show/hide">
              <svg id="eyeShow" viewBox="0 0 20 20" fill="currentColor" width="16">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
              </svg>
              <svg id="eyeHide" viewBox="0 0 20 20" fill="currentColor" width="16" style="display:none">
                <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/>
                <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>
              </svg>
            </button>
          </div>

          <!-- VERIFY BUTTON -->
          <button class="verify-btn" id="verifyBtn" onclick="analyzePassword()" type="button" disabled>
            <span class="btn-idle">
              <svg viewBox="0 0 20 20" fill="currentColor" width="16">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
              </svg>
              Verify
            </span>
            <span class="btn-loading" style="display:none">
              <span class="spinner"></span>
              Analyzing…
            </span>
          </button>
        </div>
      </div>

      <!-- Live checklist -->
      <div class="checklist">
        <div class="check-item" id="chk-length">
          <span class="check-icon">
            <svg viewBox="0 0 12 12" fill="none" width="10"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/></svg>
          </span>
          <span>8+ characters</span>
        </div>
        <div class="check-item" id="chk-upper">
          <span class="check-icon">
            <svg viewBox="0 0 12 12" fill="none" width="10"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/></svg>
          </span>
          <span>Uppercase letter</span>
        </div>
        <div class="check-item" id="chk-number">
          <span class="check-icon">
            <svg viewBox="0 0 12 12" fill="none" width="10"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/></svg>
          </span>
          <span>Number</span>
        </div>
        <div class="check-item" id="chk-special">
          <span class="check-icon">
            <svg viewBox="0 0 12 12" fill="none" width="10"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/></svg>
          </span>
          <span>Special character</span>
        </div>
      </div>

      <!-- AI Strength — only shown after verify -->
      <div class="strength-panel" id="strengthPanel">
        <div class="strength-top">
          <span class="strength-label">AI Strength Score</span>
          <div class="strength-right">
            <span class="strength-score" id="strengthScore">—</span>
            <span class="strength-badge" id="strengthBadge">—</span>
          </div>
        </div>
        <!-- 10 segment bar -->
        <div class="seg-bar" id="segBar">
          <div class="seg" data-i="1"></div>
          <div class="seg" data-i="2"></div>
          <div class="seg" data-i="3"></div>
          <div class="seg" data-i="4"></div>
          <div class="seg" data-i="5"></div>
          <div class="seg" data-i="6"></div>
          <div class="seg" data-i="7"></div>
          <div class="seg" data-i="8"></div>
          <div class="seg" data-i="9"></div>
          <div class="seg" data-i="10"></div>
        </div>
      </div>

      <!-- Feedback area -->
      <div class="feedback-wrap" id="feedbackWrap">
        <div class="feedback-header">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" style="color:var(--accent)">
            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
          </svg>
          <span>AI Analysis</span>
        </div>
        <div class="feedback-body" id="feedback">
          <div class="feedback-idle">
            <div class="idle-icon">
              <svg viewBox="0 0 24 24" fill="none" width="32">
                <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V6l-9-4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" opacity="0.4"/>
                <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
              </svg>
            </div>
            <p>Enter a password and click <strong>Verify</strong> to get detailed AI feedback</p>
          </div>
        </div>
      </div>

    </main>

    <footer class="footer">
      <svg viewBox="0 0 16 16" fill="currentColor" width="11" style="color:var(--accent);opacity:0.6">
        <path fill-rule="evenodd" d="M8 1a5 5 0 00-5 5v1H2a1 1 0 00-1 1v6a1 1 0 001 1h12a1 1 0 001-1V8a1 1 0 00-1-1h-1V6a5 5 0 00-5-5zm3 6V6a3 3 0 10-6 0v1h6z" clip-rule="evenodd"/>
      </svg>
      PassGuard AI · Your password is never stored or transmitted insecurely
    </footer>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
